# Grants full control over DownscalePolicies. The aggregation labels fold
# these permissions into the built-in "edit" and "admin" ClusterRoles, so any
# user with a namespace-scoped edit/admin RoleBinding can manage the
# DownscalePolicy of their namespace without extra bindings.
# Remove the labels if you prefer to bind this role explicitly.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: downscalepolicy-editor-role
  labels:
    app.kubernetes.io/name: downscale-policy
    rbac.authorization.k8s.io/aggregate-to-edit: "true"
    rbac.authorization.k8s.io/aggregate-to-admin: "true"
rules:
- apiGroups:
  - downscaler.io
  resources:
  - downscalepolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - downscaler.io
  resources:
  - downscalepolicies/status
  verbs:
  - get
