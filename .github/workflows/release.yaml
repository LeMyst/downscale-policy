name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  image:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build and push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  chart:
    name: Package and push Helm chart
    runs-on: ubuntu-latest
    needs: image
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin
      - name: Package and push chart
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          OWNER="$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          helm package charts/downscale-policy --version "$VERSION" --app-version "$VERSION"
          helm push "downscale-policy-$VERSION.tgz" "oci://ghcr.io/$OWNER/charts"

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - image
      - chart
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Create release with generated notes
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            config/crd/bases/downscaler.io_downscalepolicies.yaml
