{{- if .Values.rbac.create }}
# Roles for namespace users. With rbac.aggregateToDefaultRoles=true these are
# folded into the built-in edit/admin/view ClusterRoles, so a user with a
# namespace-scoped edit RoleBinding can manage the DownscalePolicy of their
# namespace without any extra binding.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "downscale-policy.fullname" . }}-editor
  labels:
    {{- include "downscale-policy.labels" . | nindent 4 }}
    {{- if .Values.rbac.aggregateToDefaultRoles }}
    rbac.authorization.k8s.io/aggregate-to-edit: "true"
    rbac.authorization.k8s.io/aggregate-to-admin: "true"
    {{- end }}
rules:
  - apiGroups:
      - downscaler.io
    resources:
      - downscalepolicies
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - downscaler.io
    resources:
      - downscalepolicies/status
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "downscale-policy.fullname" . }}-viewer
  labels:
    {{- include "downscale-policy.labels" . | nindent 4 }}
    {{- if .Values.rbac.aggregateToDefaultRoles }}
    rbac.authorization.k8s.io/aggregate-to-view: "true"
    {{- end }}
rules:
  - apiGroups:
      - downscaler.io
    resources:
      - downscalepolicies
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - downscaler.io
    resources:
      - downscalepolicies/status
    verbs:
      - get
{{- end }}
