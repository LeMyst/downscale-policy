{{- if .Values.rbac.create }}
# Permissions the manager needs. Keep in sync with config/rbac/role.yaml
# (generated from the kubebuilder RBAC markers in the controller).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "downscale-policy.fullname" . }}-manager
  labels:
    {{- include "downscale-policy.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - downscaler.io
    resources:
      - downscalepolicies
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - downscaler.io
    resources:
      - downscalepolicies/finalizers
    verbs:
      - update
  - apiGroups:
      - downscaler.io
    resources:
      - downscalepolicies/status
    verbs:
      - get
      - patch
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "downscale-policy.fullname" . }}-manager
  labels:
    {{- include "downscale-policy.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "downscale-policy.fullname" . }}-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "downscale-policy.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- if .Values.leaderElection.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "downscale-policy.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "downscale-policy.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "downscale-policy.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "downscale-policy.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "downscale-policy.fullname" . }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ include "downscale-policy.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
